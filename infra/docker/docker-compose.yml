# name: self-healing-agent

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ${PWD}/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console UI
    volumes:
      - miniodata:/data
    # healthcheck:
    #   test: ["CMD", "sh", "-c", "curl -sf http://localhost:9000/minio/health/live > /dev/null"]
    #   interval: 5s
    #   timeout: 3s
    #   retries: 20

  # Create buckets on startup (idempotent)
  minio_init:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    depends_on:
      - minio
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      RAW_BUCKET: ${RAW_BUCKET}
      PROCESS_BUCKET: ${PROCESSED_BUCKET}
      QUARANTINE_BUCKET: ${QUARANTINE_BUCKET}
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO...' ;
      until mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY} 2>/dev/null; do
        sleep 2;
      done;
      mc mb -p local/${RAW_BUCKET} || true &&
      mc mb -p local/${PROCESSED_BUCKET} || true &&
      mc mb -p local/${QUARANTINE_BUCKET} || true
      echo 'MinIO buckets ensured.' &&
      exit 0
      "
  # Placeholder for next step
  orchestrator:
    build:
      context: ../../services/orchestrator
    env_file:
      - ../../.env
    ports:
      - "${ORCH_PORT}:8000"
    depends_on:
      - postgres
      - minio
      - minio_init

volumes:
  pgdata:
  miniodata:
